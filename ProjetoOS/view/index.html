<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu ProjetoOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   
    <style>
        .titulo {
            background-color: #596d9b;
            color: white;
            padding: 10px;
            margin-bottom: 20px;
        }
        #osForm {
            background-color: #D9E2EF;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .nav-tabs {
            justify-content: center;
        }
        .nav-tabs .nav-item {
            margin-bottom: -1px;
        }
        .nav-tabs .nav-link {
            border: 1px solid #ddd;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            color: #000;
            margin-right: 2px;
        }
        .nav-tabs .nav-link.active {
            background-color: red; /*Muda cor*/
            color: #fff;
        }
        .sub-nav {
            display: flex;
            justify-content: center;
            background-color: #f8f9fa;
            padding: 10px 0;
        }
        .sub-nav a {
            margin: 0 10px;
            color: #000;
            text-decoration: none;
        }
        .sub-nav a:hover {
            text-decoration: underline;
        }
	.container {
	   text-align: center;
	}
    </style>

</head>
<body>

      <div class="container mt-3">
    <ul class="nav nav-tabs">
      <li class="nav-item">
        <a class="nav-link" href="index.html">Menu</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="cliente.html">Cliente</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="produto.html">Produto</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="cadastra_os.html">Cadastra OS</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="consulta_os.html">Consulta OS</a>
      </li>
    </ul>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const page = window.location.pathname.split("/").pop();
      const navLinks = document.querySelectorAll(".nav-link");
      navLinks.forEach(link => {
        if(link.getAttribute("href") === page) {
          link.classList.add("active");
        }
      });
    });
  </script>
      <div class="container mt-5">
        <h2>Sitema para cadastro de clientes, produtos e ordens de serviço.</h2>
      </div>
</body>
</html>
